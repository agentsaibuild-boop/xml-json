<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML → JSON Конвертор</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; text-align: center; }
        .upload-area {
            border: 3px dashed #4CAF50;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: white;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .upload-area:hover { background: #f0fff0; }
        .upload-area input { display: none; }
        .upload-area p { font-size: 18px; color: #666; }
        .container { display: flex; gap: 20px; }
        textarea {
            width: 100%;
            height: 300px;
            font-family: monospace;
            font-size: 13px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .buttons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            color: white;
        }
        .btn-convert { background: #4CAF50; }
        .btn-download { background: #2196F3; display: none; }
        .btn-convert:hover { background: #45a049; }
        .btn-download:hover { background: #1976D2; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        #filename { color: #4CAF50; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🔄 XML → JSON Конвертор</h1>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".xml" onchange="loadFile(event)">
        <p>📂 Кликни тук или провлачи XML файл</p>
        <div id="filename"></div>
    </div>

    <div class="container">
        <div style="flex:1">
            <label>XML съдържание:</label>
            <textarea id="xmlInput" placeholder="XML ще се появи тук след upload..."></textarea>
        </div>
        <div style="flex:1">
            <label>Резултат JSON:</label>
            <textarea id="jsonOutput" readonly placeholder="JSON ще се появи тук..."></textarea>
        </div>
    </div>

    <div class="buttons">
        <button class="btn-convert" onclick="convert()">🔄 Конвертирай</button>
        <button class="btn-download" id="downloadBtn" onclick="downloadJSON()">⬇️ Свали JSON</button>
    </div>

    <script>
        let originalFilename = "output";

        function loadFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            originalFilename = file.name.replace(".xml", "");
            document.getElementById("filename").textContent = "✅ Зареден: " + file.name;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById("xmlInput").value = e.target.result;
            };
            reader.readAsText(file);
        }

        function xmlToJson(xml) {
            const obj = {};
            if (xml.nodeType === 1 && xml.attributes.length > 0) {
                obj["@attributes"] = {};
                for (let j = 0; j < xml.attributes.length; j++) {
                    obj["@attributes"][xml.attributes[j].nodeName] = xml.attributes[j].nodeValue;
                }
            }
            if (xml.hasChildNodes()) {
                for (let i = 0; i < xml.childNodes.length; i++) {
                    const item = xml.childNodes[i];
                    if (item.nodeType === 3) {
                        if (item.nodeValue.trim()) return item.nodeValue.trim();
                    } else {
                        const nodeName = item.nodeName;
                        if (typeof obj[nodeName] === "undefined") {
                            obj[nodeName] = xmlToJson(item);
                        } else {
                            if (!Array.isArray(obj[nodeName])) obj[nodeName] = [obj[nodeName]];
                            obj[nodeName].push(xmlToJson(item));
                        }
                    }
                }
            }
            return obj;
        }

        function convert() {
            const xmlStr = document.getElementById("xmlInput").value;
            if (!xmlStr.trim()) { alert("Моля качи XML файл!"); return; }
            try {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlStr, "text/xml");
                if (xmlDoc.querySelector("parsererror")) {
                    document.getElementById("jsonOutput").value = "❌ Невалиден XML!";
                    return;
                }
                const json = xmlToJson(xmlDoc.documentElement);
                const result = {};
                result[xmlDoc.documentElement.nodeName] = json;
                document.getElementById("jsonOutput").value = JSON.stringify(result, null, 4);
                document.getElementById("downloadBtn").style.display = "block";
            } catch (e) {
                document.getElementById("jsonOutput").value = "❌ Грешка: " + e.message;
            }
        }

        function downloadJSON() {
            const json = document.getElementById("jsonOutput").value;
            const blob = new Blob([json], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = originalFilename + ".json";
            a.click();
        }
    </script>
</body>
</html>
