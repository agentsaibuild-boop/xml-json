<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML → JSON Конвертор</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; text-align: center; }
        .container {
            display: flex;
            gap: 20px;
        }
        textarea {
            width: 100%;
            height: 300px;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        button {
            display: block;
            margin: 20px auto;
            padding: 12px 40px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover { background: #45a049; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>🔄 XML → JSON Конвертор</h1>
    <div class="container">
        <div style="flex:1">
            <label>Въведи XML:</label>
            <textarea id="xmlInput" placeholder="Постави XML тук..."></textarea>
        </div>
        <div style="flex:1">
            <label>Резултат JSON:</label>
            <textarea id="jsonOutput" readonly placeholder="JSON ще се появи тук..."></textarea>
        </div>
    </div>
    <button onclick="convert()">🔄 Конвертирай</button>

    <script>
        function xmlToJson(xml) {
            const obj = {};
            if (xml.nodeType === 1 && xml.attributes.length > 0) {
                obj["@attributes"] = {};
                for (let j = 0; j < xml.attributes.length; j++) {
                    obj["@attributes"][xml.attributes[j].nodeName] = xml.attributes[j].nodeValue;
                }
            }
            if (xml.hasChildNodes()) {
                for (let i = 0; i < xml.childNodes.length; i++) {
                    const item = xml.childNodes[i];
                    if (item.nodeType === 3) {
                        if (item.nodeValue.trim()) return item.nodeValue.trim();
                    } else {
                        const nodeName = item.nodeName;
                        if (typeof obj[nodeName] === "undefined") {
                            obj[nodeName] = xmlToJson(item);
                        } else {
                            if (!Array.isArray(obj[nodeName])) obj[nodeName] = [obj[nodeName]];
                            obj[nodeName].push(xmlToJson(item));
                        }
                    }
                }
            }
            return obj;
        }

        function convert() {
            const xmlStr = document.getElementById("xmlInput").value;
            if (!xmlStr.trim()) {
                alert("Моля въведи XML!");
                return;
            }
            try {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlStr, "text/xml");
                const errorNode = xmlDoc.querySelector("parsererror");
                if (errorNode) {
                    document.getElementById("jsonOutput").value = "❌ Невалиден XML!";
                    return;
                }
                const json = xmlToJson(xmlDoc.documentElement);
                const result = {};
                result[xmlDoc.documentElement.nodeName] = json;
                document.getElementById("jsonOutput").value = JSON.stringify(result, null, 4);
            } catch (e) {
                document.getElementById("jsonOutput").value = "❌ Грешка: " + e.message;
            }
        }
    </script>
</body>
</html>
